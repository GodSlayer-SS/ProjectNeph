# Nephis Tool Manifest — tools.toml
# Loaded at startup. The risk map and schema validate against these entries.
# Hard rule: to add a tool, add it here first. Never add it only in Rust code.
#
# Schema per tool:
#   name        = unique tool ID (snake_case)
#   risk        = "green" | "yellow" | "red"
#   description = what the LLM planner reads to decide when to use this tool
#   domain      = execution domain handle (see domains/ module)
#   egress      = list of allowed hostnames ([] = no network)
#   phase       = minimum phase required (1–4); gated in runner.rs
#
# [tool.args] declares required/optional fields for schema validation.
# type = "string" | "integer" | "boolean"

# ── Notes ─────────────────────────────────────────────────────────────────────

[[tool]]
name = "create_note"
risk = "green"
description = "Create a plain-text note saved to the local database."
domain = "workspace"
egress = []
phase = 1

[tool.args]
body = { type = "string", required = true, description = "Note content." }

[[tool]]
name = "list_notes"
risk = "green"
description = "List all notes (titles and IDs)."
domain = "workspace"
egress = []
phase = 1

[[tool]]
name = "search_notes"
risk = "green"
description = "Search notes by keyword."
domain = "workspace"
egress = []
phase = 1

[tool.args]
query = { type = "string", required = true, description = "Search term." }

[[tool]]
name = "update_note"
risk = "yellow"
description = "Replace the body of an existing note."
domain = "workspace"
egress = []
phase = 1

[tool.args]
id   = { type = "integer", required = true, description = "Note ID." }
body = { type = "string",  required = true, description = "New content." }

[[tool]]
name = "delete_note"
risk = "yellow"
description = "Delete a note by ID."
domain = "workspace"
egress = []
phase = 1

[tool.args]
id = { type = "integer", required = true, description = "Note ID to delete." }

